services:
  rtk-dashboard:
    build: .
    container_name: rtk-dashboard
    restart: unless-stopped
    networks:
      - infra_network
    ports:
      # Tailscale only - regla sagrada, sin -p 0.0.0.0
      - "100.80.61.96:8088:8088"
    volumes:
      # DB activa del dashboard, read-only
      - /opt/data/home/.local/share/rtk:/data/rtk:ro
      # Log de gateway que server.py lee en algunos endpoints
      - /opt/data/logs/gateway.log:/data/gateway.log:ro
    environment:
      - TZ=America/Santiago
    cpus: "0.5"
    mem_limit: 256m

networks:
  infra_network:
    external: true
